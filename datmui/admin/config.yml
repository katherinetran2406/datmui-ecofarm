backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "vi"

collections:
  - name: "blog"
    label: "Blog"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Tiêu đề bài viết", name: "title", widget: "string", hint: "Tiêu đề hiển thị trên trang" }
      - { label: "Ngày đăng", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - label: "Ảnh đại diện"
        name: "featured_image"
        widget: "image"
        required: false
        hint: "Ảnh thumbnail hiển thị trong danh sách blog (khuyến nghị 800x450px)"
      - { label: "Mô tả ngắn", name: "summary", widget: "text", hint: "Hiển thị trong card preview, tối đa 160 ký tự" }
      - { label: "Nội dung bài viết", name: "body", widget: "markdown" }
      - label: "SEO"
        name: "seo"
        widget: "object"
        collapsed: true
        fields:
          - { label: "SEO Title", name: "title", widget: "string", required: false, hint: "Tiêu đề hiển thị trên Google (50–60 ký tự)" }
          - { label: "Meta Description", name: "description", widget: "text", required: false, hint: "Mô tả hiển thị trên Google (120–160 ký tự)" }
      - label: "Danh mục"
        name: "category"
        widget: "select"
        options:
          - { label: "Tin tức vườn", value: "tin-tuc" }
          - { label: "Kiến thức sức khỏe", value: "suc-khoe" }
          - { label: "Canh tác sinh thái", value: "canh-tac" }
          - { label: "Cộng đồng chủ vườn", value: "cong-dong" }
        default: "tin-tuc"
