<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blog – Đất Mũi Eco Farm</title>
<meta name="description" content="Kiến thức nông nghiệp sinh thái, sức khỏe và tin tức từ vườn Mận Hồng ST Đất Mũi Eco Farm.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
:root{--green:#1A531A;--g2:#2E7D32;--g3:#4CAF50;--gold:#F0C040;--bg2:#F5F9F3;--gray:#4A5568;--lgray:#9CA3AF;--w:#fff}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg2);color:var(--green)}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
.container{max-width:1140px;margin:0 auto;padding:0 24px}

/* NAV */
.nav{background:rgba(255,255,255,.97);backdrop-filter:blur(18px);border-bottom:1px solid rgba(76,175,80,.12);padding:0 4vw;height:70px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(26,83,26,.06)}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo .l1{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--green)}
.nav-logo .l2{font-family:'Be Vietnam Pro',sans-serif;font-size:.9rem;font-weight:800;color:#D4A017;letter-spacing:.06em;text-transform:uppercase}
.nav-back{font-family:'Be Vietnam Pro',sans-serif;font-size:.85rem;font-weight:600;color:var(--g2);display:flex;align-items:center;gap:6px;padding:8px 16px;border:1.5px solid rgba(76,175,80,.3);border-radius:100px;transition:all .2s}
.nav-back:hover{background:var(--g3);color:#fff;border-color:var(--g3)}

/* HERO */
.blog-hero{background:linear-gradient(135deg,var(--green) 0%,var(--g2) 100%);padding:56px 0;text-align:center}
.blog-hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;color:#fff;margin-bottom:10px}
.blog-hero h1 em{color:var(--gold);font-style:italic}
.blog-hero p{font-family:'Be Vietnam Pro',sans-serif;color:rgba(255,255,255,.75);font-size:.97rem}

/* FILTER */
.filter-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:32px 0 8px}
.filter-btn{font-family:'Be Vietnam Pro',sans-serif;font-size:.8rem;font-weight:700;padding:7px 18px;border-radius:100px;border:2px solid rgba(76,175,80,.22);background:var(--w);color:var(--g2);cursor:pointer;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:var(--g3);color:#fff;border-color:var(--g3)}

/* GRID */
.blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:24px 0 64px}
@media(max-width:900px){.blog-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.blog-grid{grid-template-columns:1fr}}

/* CARD */
.blog-card{background:var(--w);border-radius:18px;overflow:hidden;box-shadow:0 3px 18px rgba(26,83,26,.08);transition:transform .25s,box-shadow .25s;display:flex;flex-direction:column}
.blog-card:hover{transform:translateY(-4px);box-shadow:0 10px 36px rgba(26,83,26,.14)}
.card-img{width:100%;height:200px;object-fit:cover}
.card-img-placeholder{height:200px;background:linear-gradient(135deg,#d8f3dc,#95d5b2);display:flex;align-items:center;justify-content:center}
.card-img-placeholder svg{opacity:.4}
.card-body{padding:20px;flex:1;display:flex;flex-direction:column}
.card-cat{display:inline-block;font-family:'Be Vietnam Pro',sans-serif;font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--g3);margin-bottom:8px}
.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--green);line-height:1.3;margin-bottom:8px}
.card-summary{font-family:'Be Vietnam Pro',sans-serif;font-size:.84rem;color:var(--gray);line-height:1.7;flex:1;margin-bottom:16px}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.card-date{font-family:'Be Vietnam Pro',sans-serif;font-size:.74rem;color:var(--lgray)}
.btn-read{font-family:'Be Vietnam Pro',sans-serif;font-size:.8rem;font-weight:700;padding:7px 18px;background:var(--g3);color:#fff;border-radius:100px;transition:background .2s;box-shadow:0 2px 8px rgba(76,175,80,.25)}
.btn-read:hover{background:var(--g2)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 24px;color:var(--lgray)}
.empty-state p{font-family:'Be Vietnam Pro',sans-serif;font-size:.95rem;margin-top:12px}

/* FOOTER minimal */
.mini-footer{background:var(--green);padding:24px 0;text-align:center}
.mini-footer p{font-family:'Be Vietnam Pro',sans-serif;font-size:.78rem;color:rgba(255,255,255,.45)}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <div><div class="l1">Đất Mũi</div><div class="l2">ECO FARM</div></div>
  </a>
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Về trang chủ
  </a>
</nav>

<div class="blog-hero">
  <div class="container">
    <h1>Blog & <em>Tin tức</em></h1>
    <p>Kiến thức sức khỏe, canh tác sinh thái và tin tức từ vườn Dr. Hùng</p>
  </div>
</div>

<div class="container">
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterPosts('all',this)">Tất cả</button>
    <button class="filter-btn" onclick="filterPosts('tin-tuc',this)">Tin tức vườn</button>
    <button class="filter-btn" onclick="filterPosts('suc-khoe',this)">Kiến thức sức khỏe</button>
    <button class="filter-btn" onclick="filterPosts('canh-tac',this)">Canh tác sinh thái</button>
    <button class="filter-btn" onclick="filterPosts('cong-dong',this)">Cộng đồng chủ vườn</button>
  </div>

  <div class="blog-grid" id="blogGrid">
    <!-- Populated by JS from _posts JSON -->
    <div class="empty-state" style="grid-column:1/-1">
      <svg width="56" height="56" fill="none" stroke="#9CA3AF" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <p>Chưa có bài viết nào.<br>Đăng nhập <a href="admin/" style="color:#4CAF50;font-weight:700">/admin</a> để viết bài đầu tiên!</p>
    </div>
  </div>
</div>

<footer class="mini-footer">
  <p>© 2025 Đất Mũi Eco Farm · <a href="index.html" style="color:rgba(255,255,255,.6)">Về trang chủ</a> · <a href="admin/" style="color:rgba(255,255,255,.4)">Admin</a></p>
</footer>

<!-- Netlify CMS reads posts from _posts/ folder.
     For static rendering, this page auto-reads a generated posts.json
     OR you can use a static site generator (Jekyll/Hugo) to build cards.
     Below is a helper that reads from localStorage if posts.json exists. -->
<script>
// Fetch generated posts index (created by build process or manually)
async function loadPosts() {
  try {
    const res = await fetch('posts.json');
    if (!res.ok) return;
    const posts = await res.json();
    renderPosts(posts, 'all');
  } catch(e) {
    // No posts.json yet — keep empty state
  }
}

let allPosts = [];
function renderPosts(posts, filter) {
  allPosts = posts;
  const grid = document.getElementById('blogGrid');
  const filtered = filter === 'all' ? posts : posts.filter(p => p.category === filter);
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><p>Chưa có bài viết trong danh mục này.</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(p => {
    const img = p.featured_image
      ? '<img class="card-img" src="' + p.featured_image + '" alt="' + p.title + '" loading="lazy">'
      : '<div class="card-img-placeholder"><svg width="48" height="48" fill="none" stroke="#4CAF50" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';
    const catLabels = {'tin-tuc':'Tin tức vườn','suc-khoe':'Sức khỏe','canh-tac':'Canh tác','cong-dong':'Cộng đồng'};
    const cat = catLabels[p.category] || p.category;
    const slug = p.slug || p.title.toLowerCase().replace(/[^a-z0-9]+/g,'-');
    return '<a class="blog-card" href="blog-post.html?slug=' + slug + '">'
      + img
      + '<div class="card-body">'
      + '<span class="card-cat">' + cat + '</span>'
      + '<div class="card-title">' + p.title + '</div>'
      + '<div class="card-summary">' + (p.summary || '').substring(0,140) + '...</div>'
      + '<div class="card-footer">'
      + '<span class="card-date">' + (p.date || '') + '</span>'
      + '<span class="btn-read">Đọc thêm →</span>'
      + '</div></div></a>';
  }).join('');
}

function filterPosts(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPosts(allPosts, cat);
}

loadPosts();
</script>

<!-- Netlify Identity redirect helper -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
if (window.netlifyIdentity) {
  window.netlifyIdentity.on('init', user => {
    if (!user) {
      window.netlifyIdentity.on('login', () => { document.location.href = '/admin/'; });
    }
  });
}
</script>
</body>
</html>
